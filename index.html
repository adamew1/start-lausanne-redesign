<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>START Lausanne — Redesign</title>
<link rel="icon" type="image/png" href="https://cdn.prod.website-files.com/639832a06215ce13af0dfe47/65425d7bb0b9d6b81196dcae_cropped-Polygon-bleu-p-500.png">
<link rel="apple-touch-icon" href="https://cdn.prod.website-files.com/639832a06215ce13af0dfe47/65425d7bb0b9d6b81196dcae_cropped-Polygon-bleu-p-500.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap">
<style>
:root {
  --bg: #00002c;              /* Munich midnight navy — PAGE */
  --bg-elev: #0a0a2e;          /* elevated surface (cards) */
  --bg-card: #0d0d1f;          /* primary card */
  --bg-tint: #1a1a3e;          /* stronger panel tint */
  --bg-dark: #000018;          /* deepest vignette */
  --bg-darker: #000010;
  --border: rgba(255,255,255,0.10);
  --border-strong: rgba(255,255,255,0.24);
  --border-dark: rgba(255,255,255,0.14);
  --text: #ffffff;
  --text-dim: rgba(255,255,255,0.72);
  --text-mute: rgba(255,255,255,0.48);
  --text-invert: #0d0d1f;
  --text-dim-invert: rgba(13,13,31,0.66);
  --accent: #3b82f6;           /* bright blue — pops on dark */
  --accent-dim: #2563eb;
  --accent-soft: rgba(59,130,246,0.14);
  --accent-glow: rgba(59,130,246,0.55);
  --navy: #00002c;
  --sky: #d0006f;              /* magenta — minor pop accent */
  --display: "Montserrat", system-ui, -apple-system, sans-serif;
  --body: "Montserrat", system-ui, -apple-system, sans-serif;
  --mono: "Montserrat", ui-monospace, monospace;
  --rad-sm: 8px;
  --rad-md: 14px;
  --rad-lg: 22px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.04);
  --shadow-md: 0 10px 30px -10px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
  --shadow-lg: 0 40px 80px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06);
}

*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  font-size: 16px;
  font-weight: 400;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; }
img { max-width: 100%; display: block; }

/* grain overlay + cursor glow */
.grain {
  position: fixed; inset: 0; pointer-events: none; z-index: 9998;
  opacity: 0.05; mix-blend-mode: screen;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}
.cursor-glow {
  position: fixed; width: 720px; height: 720px; border-radius: 50%;
  background: radial-gradient(circle, rgba(59,130,246,0.18) 0%, transparent 60%);
  pointer-events: none; z-index: 1; transform: translate(-50%,-50%);
  transition: opacity 0.3s; will-change: transform;
  mix-blend-mode: screen;
}
/* ambient glow orbs (page-wide) */
body::before, body::after {
  content: ""; position: fixed; pointer-events: none; z-index: 0;
  width: 900px; height: 900px; border-radius: 50%;
  filter: blur(120px); opacity: 0.4;
}
body::before {
  top: -25%; left: -12%;
  background: radial-gradient(circle, rgba(59,130,246,0.42) 0%, transparent 60%);
}
body::after {
  bottom: -25%; right: -12%;
  background: radial-gradient(circle, rgba(208,0,111,0.28) 0%, transparent 60%);
}

::selection { background: var(--accent); color: #fff; }

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* ============ layout ============ */
.page { min-height: 100vh; position: relative; z-index: 2; }
.container { max-width: 1440px; margin: 0 auto; padding: 0 48px; }
@media (max-width: 768px) { .container { padding: 0 20px; } }

/* ============ nav ============ */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  background: rgba(0,0,44,0.72);
  border-bottom: 1px solid var(--border);
}
.nav-inner {
  max-width: 1440px; margin: 0 auto; padding: 14px 48px;
  display: flex; align-items: center; justify-content: space-between; gap: 24px;
}
.nav-logo {
  font-family: var(--display); font-weight: 800; font-size: 17px;
  letter-spacing: -0.02em; display: flex; align-items: center; gap: 10px;
  cursor: pointer; text-transform: uppercase;
}
.nav-logo-mark {
  width: 28px; height: 28px;
  background: url("https://cdn.prod.website-files.com/639832a06215ce13af0dfe47/65425d7bb0b9d6b81196dcae_cropped-Polygon-bleu-p-500.png") no-repeat center / contain;
}
.nav-links {
  display: flex; align-items: center; gap: 2px;
  font-family: var(--body); font-size: 12px; text-transform: uppercase;
  letter-spacing: 0.1em; font-weight: 600;
}
.nav-link {
  padding: 8px 14px; color: var(--text-dim); cursor: pointer;
  border-radius: 999px; transition: all 0.2s;
  position: relative;
}
.nav-link:hover { color: var(--text); background: rgba(255,255,255,0.06); }
.nav-link.active { color: var(--accent); }
.nav-link.active::before {
  content: ""; position: absolute; left: 14px; right: 14px; bottom: 2px;
  height: 2px; background: var(--accent); border-radius: 2px;
}
.nav-cta {
  font-family: var(--body); font-size: 12px; text-transform: uppercase;
  letter-spacing: 0.1em; padding: 11px 20px; border-radius: 999px;
  background: var(--text); color: var(--bg); font-weight: 700;
  border: 1px solid var(--text); cursor: pointer;
  transition: all 0.25s;
}
.nav-cta:hover {
  background: var(--accent); color: #fff; border-color: var(--accent);
  box-shadow: 0 10px 30px -10px var(--accent-glow);
  transform: translateY(-1px);
}

.nav-burger {
  display: none; background: none; border: 1px solid var(--border-strong);
  color: var(--text); padding: 8px 14px; border-radius: 999px; cursor: pointer;
  font-family: var(--body); font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.1em;
}

@media (max-width: 900px) {
  .nav-inner { padding: 12px 20px; }
  .nav-links, .nav-cta { display: none; }
  .nav-burger { display: block; }
  .nav.mobile-open .nav-links {
    display: flex; flex-direction: column; position: absolute;
    top: 100%; left: 0; right: 0; background: var(--bg-elev);
    padding: 16px 20px 24px; gap: 2px; border-bottom: 1px solid var(--border);
  }
}

/* ============ typography ============ */
.h-display {
  font-family: var(--display); font-weight: 800;
  font-size: clamp(56px, 10vw, 180px); line-height: 0.90;
  letter-spacing: -0.045em; margin: 0;
}
.h-xl {
  font-family: var(--display); font-weight: 800;
  font-size: clamp(40px, 6.4vw, 104px); line-height: 0.95;
  letter-spacing: -0.035em; margin: 0;
}
.h-lg {
  font-family: var(--display); font-weight: 700;
  font-size: clamp(28px, 3.8vw, 58px); line-height: 1.02;
  letter-spacing: -0.025em; margin: 0;
}
.h-md {
  font-family: var(--display); font-weight: 700;
  font-size: clamp(20px, 2.2vw, 32px); line-height: 1.15;
  letter-spacing: -0.02em; margin: 0;
}

.outline {
  -webkit-text-stroke: 1.5px var(--text);
  -webkit-text-fill-color: transparent;
  color: transparent;
}
.outline-invert {
  -webkit-text-stroke: 1.5px #fff;
  -webkit-text-fill-color: transparent;
  color: transparent;
}

.mono-eyebrow {
  font-family: var(--body); font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.14em; color: var(--accent);
  display: inline-flex; align-items: center; gap: 10px;
}
.mono-eyebrow::before {
  content: ""; width: 8px; height: 8px; background: var(--accent);
  border-radius: 50%; box-shadow: 0 0 0 4px rgba(59,130,246,0.2);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 4px rgba(59,130,246,0.2); }
  50% { box-shadow: 0 0 0 8px rgba(29,78,216,0.0); }
}
.mono-label {
  font-family: var(--body); font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-mute);
}
.lead {
  font-size: clamp(16px, 1.35vw, 20px); line-height: 1.55;
  color: var(--text-dim); max-width: 62ch; font-weight: 400;
}
.accent { color: var(--accent); }

/* ============ buttons ============ */
.btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 24px; border-radius: 999px; cursor: pointer;
  font-family: var(--body); font-size: 12px; text-transform: uppercase;
  letter-spacing: 0.12em; font-weight: 700; transition: all 0.25s;
  border: 1px solid var(--text); background: transparent; color: var(--text);
  position: relative; overflow: hidden;
}
.btn:hover {
  background: var(--text); color: var(--bg);
  transform: translateY(-1px);
  box-shadow: 0 10px 26px -10px rgba(0,0,0,0.6);
}
.btn-primary {
  background: var(--accent); color: #fff; border-color: var(--accent);
  font-weight: 700;
}
.btn-primary:hover {
  background: var(--accent-dim); color: #fff; border-color: var(--accent-dim);
  box-shadow: 0 14px 34px -10px var(--accent-glow);
}
.btn-ghost-light {
  border-color: rgba(255,255,255,0.35); color: #fff;
}
.btn-ghost-light:hover {
  background: #fff; color: var(--text); border-color: #fff;
}
.btn .arrow {
  width: 14px; height: 14px; position: relative;
  transition: transform 0.25s;
}
.btn .arrow::before {
  content: ""; position: absolute; top: 50%; left: 0; right: 0;
  height: 1.5px; background: currentColor; border-radius: 2px;
}
.btn .arrow::after {
  content: ""; position: absolute; top: 50%; right: 0; width: 7px; height: 7px;
  border-top: 1.5px solid currentColor; border-right: 1.5px solid currentColor;
  transform: translateY(-50%) rotate(45deg);
}
.btn:hover .arrow { transform: translateX(4px); }

/* ============ card ============ */
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--rad-lg); padding: 28px; transition: all 0.3s;
  position: relative; overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.card:hover {
  border-color: var(--border-strong);
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
}
.card-glass {
  background: linear-gradient(180deg, var(--bg-elev), var(--bg-card));
  border: 1px solid var(--border);
  box-shadow: 0 30px 80px -20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
}
.card-dark {
  background: var(--bg-dark); color: #fff;
  border: 1px solid var(--border-dark);
}
.card-dark:hover { border-color: rgba(255,255,255,0.3); }

/* ============ marquee ============ */
.marquee {
  display: flex; overflow: hidden; gap: 0;
  mask-image: linear-gradient(90deg, transparent, black 8%, black 92%, transparent);
  -webkit-mask-image: linear-gradient(90deg, transparent, black 8%, black 92%, transparent);
}
.marquee-track {
  display: flex; gap: 80px; animation: scroll 40s linear infinite;
  white-space: nowrap; flex-shrink: 0;
}
.marquee:hover .marquee-track { animation-play-state: paused; }
@keyframes scroll {
  from { transform: translateX(0); }
  to { transform: translateX(-100%); }
}

/* ============ grid bg ============ */
.grid-bg {
  background-image:
    linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
  background-size: 80px 80px;
  background-position: -1px -1px;
}
.grid-bg-dark {
  background-image:
    linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 80px 80px;
}

/* ============ reveal animation ============ */
.reveal { opacity: 0; transform: translateY(32px); transition: opacity 0.9s ease, transform 0.9s cubic-bezier(0.2,0.7,0.2,1); }
.reveal.in { opacity: 1; transform: translateY(0); }

/* ============ tag / pill ============ */
.tag {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 7px 14px; border-radius: 999px; border: 1px solid var(--border-strong);
  font-family: var(--body); font-size: 11px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600;
  background: var(--bg-elev);
}
.tag-accent {
  border-color: var(--accent); color: var(--accent);
  background: var(--accent-soft);
}
.tag-accent::before {
  content: ""; width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.3);
}
.tag-dark {
  background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.18);
  color: #fff;
}

/* ============ divider ============ */
.divider { height: 1px; background: var(--border); margin: 0; }

/* ============ section ============ */
.section { padding: 120px 0; position: relative; }
.section-sm { padding: 72px 0; }
.section-dark {
  background: var(--bg-dark); color: #fff;
  position: relative;
}
.section-dark .mono-label { color: rgba(255,255,255,0.5); }
.section-dark .lead { color: rgba(255,255,255,0.72); }
.section-dark .tag { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.72); border-color: rgba(255,255,255,0.18); }
@media (max-width: 768px) { .section { padding: 72px 0; } .section-sm { padding: 48px 0; } }

/* ============ footer ============ */
.footer {
  border-top: 1px solid var(--border);
  padding: 100px 0 40px; position: relative; z-index: 2;
  background: var(--bg-dark); color: #fff;
}
.footer-grid {
  display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 48px;
  margin-bottom: 64px;
}
.footer-col h4 {
  font-family: var(--body); font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.14em; color: rgba(255,255,255,0.45); margin: 0 0 20px;
  font-weight: 600;
}
.footer-col a {
  display: block; color: rgba(255,255,255,0.66); padding: 6px 0;
  font-size: 14px; transition: color 0.2s; font-weight: 500;
  cursor: pointer;
}
.footer-col a:hover { color: var(--accent); }
.footer-bottom {
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--body); font-size: 11px; color: rgba(255,255,255,0.4);
  text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;
  padding-top: 32px; border-top: 1px solid rgba(255,255,255,0.08);
}
.footer-big {
  font-family: var(--display); font-weight: 900;
  font-size: clamp(80px, 15vw, 260px); line-height: 0.82;
  letter-spacing: -0.055em; margin: 0 0 56px;
  color: transparent;
  -webkit-text-stroke: 1.5px rgba(255,255,255,0.22);
}
@media (max-width: 900px) {
  .footer-grid { grid-template-columns: 1fr 1fr; gap: 32px; }
  .footer-bottom { flex-direction: column; gap: 16px; align-items: flex-start; }
}

/* ============ page-specific helpers ============ */
.split { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; }
@media (max-width: 900px) { .split { grid-template-columns: 1fr; gap: 32px; } }

.img-placeholder {
  background: var(--bg-tint);
  border: 1px solid var(--border);
  border-radius: var(--rad-md);
  aspect-ratio: 4/3;
  background-size: cover;
  background-position: center;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.img-placeholder::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 55%, rgba(0,0,44,0.35));
}

/* hero asterisk / dot motif */
.dot-accent {
  display: inline-block; width: 0.5em; height: 0.5em; border-radius: 50%;
  background: var(--accent); vertical-align: middle; margin: 0 0.1em 0.15em;
}

/* subtle link underline */
.u-link {
  border-bottom: 1.5px solid var(--accent);
  color: var(--accent); font-weight: 600;
  padding-bottom: 1px; transition: all 0.2s;
}
.u-link:hover { background: var(--accent-soft); }

</style>
</head>
<body>

<div id="root"></div>

<div class="grain" aria-hidden="true"></div>
<div class="cursor-glow" id="cursorGlow" aria-hidden="true"></div>
